{% load i18n %}

<div class="modal fade modal-emoji" tabindex="-1" aria-labelledby="modalInsertEmojiTitle" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-2xl">
      <div class="modal-header border-b border-slate-200 bg-slate-50 px-6 py-4">
        <h5 class="modal-title inline-flex items-center gap-2 text-base font-semibold text-slate-900" id="modalInsertEmojiTitle">
          <svg width="1em" height="1em" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
            <path d="M8.93 6.588l-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533L8.93 6.588z"/>
            <circle cx="8" cy="4.5" r="1"/>
          </svg>
          <span>{% trans "Select Emoji to Insert" %}</span>
        </h5>
        <button type="button" class="inline-flex cursor-pointer items-center justify-center text-slate-600 hover:text-indigo-500" data-bs-dismiss="modal" aria-label="Close">
          <svg width="1em" height="1em" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06z"/>
          </svg>
        </button>
      </div>
      <div class="modal-body emoji-content-base px-6 py-5">
        <div class="emoji-loader-init text-center text-sm text-slate-500" style="display:none">
          <div class="inline-block text-base font-semibold text-slate-700">{% trans "Preparing emojis..." %}</div>
          <div class="mt-3">{% trans "Loading the emoji catalog for this editor." %}</div>
        </div>
        <div class="emoji-content-body row p3" style="display:none"></div>
      </div>
    </div>
  </div>
</div>
